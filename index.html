<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>สั่งอาหาร & ชำระเงิน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-gray-200 text-gray-800">

  <div class="max-w-md mx-auto min-h-screen bg-gray-50 shadow-2xl relative pb-28 border-x border-gray-300">

    <header class="bg-gradient-to-r from-orange-500 to-orange-600 text-white p-4 sticky top-0 shadow-md z-10 text-center rounded-b-xl">
      <h1 class="text-2xl font-bold tracking-wide">โต๊ะ <span id="display-table-no">...</span></h1>
      <p class="text-sm text-orange-100 mt-1">ยินดีต้อนรับ! เลือกเมนูที่ต้องการได้เลย</p>
    </header>

    <div class="p-4 grid grid-cols-2 gap-4" id="menu-list">
      <p class="text-center col-span-2 text-gray-500 py-10"><i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i><br>กำลังโหลดเมนู...</p>
    </div>

    <div class="fixed bottom-0 w-full max-w-md left-1/2 transform -translate-x-1/2 bg-white p-4 shadow-[0_-4px_10px_-1px_rgba(0,0,0,0.1)] rounded-t-3xl z-20">
      <div class="flex justify-between items-center mb-3 px-2">
        <span class="font-bold text-gray-500">ตะกร้าของคุณ <span id="cart-count" class="text-orange-500 bg-orange-100 px-2 py-0.5 rounded-full text-xs ml-1">0</span></span>
        <span class="font-black text-2xl text-orange-600" id="cart-total">0 ฿</span>
      </div>
      <button onclick="openCartModal()" class="w-full bg-gradient-to-r from-gray-800 to-gray-900 text-white font-bold py-3.5 rounded-xl shadow-lg transition duration-200 transform active:scale-95">
        <i class="fa-solid fa-basket-shopping mr-2"></i> ดูตะกร้าสินค้า
      </button>
    </div>

    <div id="cart-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 z-40 flex items-end justify-center">
      <div class="bg-white w-full max-w-md rounded-t-3xl max-h-[80vh] flex flex-col relative shadow-2xl pb-6">
        <div class="p-4 border-b border-gray-100 flex justify-between items-center">
          <h2 class="text-xl font-bold text-gray-800">🛒 ตะกร้าสินค้า</h2>
          <button onclick="closeCartModal()" class="text-gray-400 text-2xl">&times;</button>
        </div>
        <div id="cart-items-container" class="p-4 overflow-y-auto flex-1 space-y-3 min-h-[150px]"></div>
        <div class="p-4 border-t border-gray-100 bg-gray-50 rounded-t-2xl mx-2">
          <button onclick="proceedToCheckout()" id="btn-proceed-pay" class="w-full bg-orange-500 text-white font-bold py-3.5 rounded-xl">
            ยืนยันและชำระเงิน <span id="modal-cart-total">0</span> ฿
          </button>
        </div>
      </div>
    </div>

    <div id="payment-modal" class="hidden fixed inset-0 bg-black bg-opacity-80 z-50 flex items-center justify-center p-4">
      <div class="bg-white rounded-3xl p-6 w-full max-w-sm text-center relative shadow-2xl">
        <button onclick="closePaymentModal()" class="absolute top-4 right-5 text-gray-400 text-2xl">&times;</button>
        <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-3 text-3xl"><i class="fa-solid fa-qrcode"></i></div>
        <h2 class="text-xl font-bold text-blue-900 mb-1">สแกนเพื่อชำระเงิน</h2>
        <div class="bg-gray-100 p-3 rounded-2xl inline-block mb-4 mt-2">
          <img id="promptpay-qr" src="" alt="PromptPay QR" class="w-48 h-48 rounded-xl bg-white p-2 shadow-sm">
        </div>
        <p class="text-sm text-gray-600 mb-5 bg-orange-50 p-2 rounded-lg border border-orange-100">เมื่อโอนเงินเรียบร้อย กรุณากดส่งออเดอร์เข้าครัว 👨‍🍳</p>
        <button onclick="submitOrder()" id="btn-submit" class="w-full bg-green-500 text-white font-bold py-3.5 rounded-xl shadow-md transition">
          <i class="fa-solid fa-paper-plane mr-2"></i> โอนแล้ว ส่งเข้าครัวเลย!
        </button>
      </div>
    </div>

  </div>

  <script>
    // 🔗 ตั้งค่าเชื่อมต่อ Supabase โดยตรงที่หน้าเว็บ
    var SUPABASE_URL = 'https://yhgdyabekfuzrapneqqe.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloZ2R5YWJla2Z1enJhcG5lcXFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1OTgyNDgsImV4cCI6MjA5NjE3NDI0OH0.YLdYVcOwd6OhcTP9L4RJ1OV58Y2ZEZJMZZQWvXDi2wU';
    var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    var cart = [];
    var productList = []; 
    var PROMPTPAY_NUMBER = "0831844160"; 
    
    // 📱 ดึงค่าเลขโต๊ะจาก URL อัตโนมัติ (เช่น ?table=A1)
    var urlParams = new URLSearchParams(window.location.search);
    var currentTableNo = urlParams.get('table') || 'ไม่ระบุโต๊ะ';
    var currentTableId = null;

    document.getElementById('display-table-no').innerText = currentTableNo;

    document.addEventListener('DOMContentLoaded', async function() {
      // 1. ดึงข้อมูลเมนูอาหารตรงจาก Supabase
      var prodRes = await supabaseClient.from('products').select('*').eq('is_available', true);
      if(prodRes.data) {
          productList = prodRes.data;
          renderMenu();
      }

      // 2. ค้นหา ID ของโต๊ะนี้จากระบบ
      var tableRes = await supabaseClient.from('tables').select('id').eq('table_no', currentTableNo).single();
      if(tableRes.data) {
          currentTableId = tableRes.data.id;
      }
    });

    function renderMenu() {
      var container = document.getElementById('menu-list');
      container.innerHTML = '';
      productList.forEach(function(p) {
        container.innerHTML += 
          '<div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col items-center">' +
            '<div class="w-full h-32 bg-gray-200 bg-cover bg-center" style="background-image: url(\'' + (p.image_url || '') + '\')"></div>' +
            '<div class="p-3 w-full flex flex-col flex-1">' +
              '<h3 class="text-sm font-bold text-gray-800 line-clamp-2 leading-tight">' + p.name + '</h3>' +
              '<p class="text-orange-500 font-black mt-1 mb-2">' + p.price + ' ฿</p>' +
              '<div id="action-btn-' + p.id + '" class="w-full mt-auto"></div>' + 
            '</div>' +
          '</div>';
      });
      refreshMenuButtons();
    }

    function refreshMenuButtons() {
      productList.forEach(function(p) {
        var btnContainer = document.getElementById('action-btn-' + p.id);
        if (!btnContainer) return;
        var cartItem = cart.find(function(item) { return item.product_id === p.id; });
        var qty = cartItem ? cartItem.qty : 0;

        if (qty > 0) {
          btnContainer.innerHTML = 
            '<div class="flex items-center justify-between bg-orange-100 text-orange-600 rounded-xl text-sm font-bold w-full overflow-hidden border border-orange-200">' +
              '<button onclick="changeQty(\'' + p.id + '\', -1)" class="w-1/3 py-2">-</button>' +
              '<span class="w-1/3 text-center">' + qty + '</span>' +
              '<button onclick="changeQty(\'' + p.id + '\', 1)" class="w-1/3 py-2">+</button>' +
            '</div>';
        } else {
          btnContainer.innerHTML = 
            '<button onclick="addToCart(\'' + p.id + '\', \'' + p.name + '\', ' + p.price + ')" class="w-full bg-orange-50 border border-orange-100 text-orange-600 py-2 rounded-xl text-sm font-bold transition"><i class="fa-solid fa-plus mr-1"></i> เพิ่ม</button>';
        }
      });
    }

    function updateCartUI() {
      var total = 0; var count = 0;
      cart.forEach(function(item) { total += (item.price * item.qty); count += item.qty; });
      document.getElementById('cart-total').innerText = total + ' ฿';
      document.getElementById('cart-count').innerText = count;
      document.getElementById('modal-cart-total').innerText = total;
      renderCartModalItems();
      refreshMenuButtons();
    }

    function addToCart(id, name, price) {
      var existing = cart.find(function(item) { return item.product_id === id; });
      if (existing) { existing.qty += 1; } else { cart.push({ product_id: id, name: name, price: price, qty: 1 }); }
      updateCartUI();
    }

    function changeQty(id, delta) {
      var index = cart.findIndex(function(item) { return item.product_id === id; });
      if (index !== -1) {
        cart[index].qty += delta;
        if (cart[index].qty <= 0) cart.splice(index, 1);
        updateCartUI();
      }
    }

    function openCartModal() {
      if (cart.length === 0) return alert('ตะกร้าว่างเปล่า');
      renderCartModalItems();
      document.getElementById('cart-modal').classList.remove('hidden');
    }

    function closeCartModal() { document.getElementById('cart-modal').classList.add('hidden'); }

    function renderCartModalItems() {
      var container = document.getElementById('cart-items-container');
      container.innerHTML = '';
      if (cart.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-400 mt-10">ไม่มีรายการในตะกร้า</p>';
        setTimeout(closeCartModal, 500); return;
      }
      cart.forEach(function(item) {
        container.innerHTML += 
          '<div class="flex justify-between items-center bg-white border border-gray-100 p-3 rounded-xl shadow-sm">' +
            '<div class="flex-1 pr-2"><h4 class="font-bold text-gray-800 text-sm">' + item.name + '</h4><p class="text-orange-500 font-semibold text-sm">' + (item.price * item.qty) + ' ฿</p></div>' +
            '<div class="flex items-center space-x-3"><div class="flex items-center bg-gray-100 rounded-lg"><button onclick="changeQty(\'' + item.product_id + '\', -1)" class="w-8 h-8">-</button><span class="w-6 text-center font-bold">' + item.qty + '</span><button onclick="changeQty(\'' + item.product_id + '\', 1)" class="w-8 h-8">+</button></div></div>' +
          '</div>';
      });
    }

    function proceedToCheckout() {
      closeCartModal();
      var total = parseInt(document.getElementById('modal-cart-total').innerText);
      document.getElementById('promptpay-qr').src = 'https://promptpay.io/' + PROMPTPAY_NUMBER + '/' + total + '.png';
      document.getElementById('payment-modal').classList.remove('hidden');
    }

    function closePaymentModal() { document.getElementById('payment-modal').classList.add('hidden'); }

    // --- ✨ ยิงสร้างบิลและส่งรายการเข้าครัวตรงเข้า Supabase (ปรับปรุงสำหรับ Vercel) ---
    async function submitOrder() {
      if (!currentTableId) return alert('ไม่พบข้อมูลโต๊ะ');
      
      var btn = document.getElementById('btn-submit');
      btn.disabled = true;
      btn.innerHTML = 'กำลังส่งออเดอร์...';

      try {
        // 1. สร้างบิลหลักในตาราง orders
        var { data: orderData, error: orderErr } = await supabaseClient
          .from('orders')
          .insert([{ table_id: currentTableId, status: 'pending', sub_total: parseInt(document.getElementById('modal-cart-total').innerText), net_total: parseInt(document.getElementById('modal-cart-total').innerText) }])
          .select()
          .single();

        if (orderErr) throw orderErr;

        // 2. จัดเตรียมและส่งรายการย่อยเข้าตาราง order_items (เพื่อให้ไปเด้งหน้าจอ KDS)
        var orderItemsPayload = cart.map(function(item) {
            return {
                order_id: orderData.id,
                product_id: item.product_id,
                qty: item.qty,
                price_at_sale: item.price,
                kitchen_route: 'hot_kitchen', // สามารถปรับผูกตามสินค้าจริงได้
                status: 'pending'
            };
        });

        var { error: itemsErr } = await supabaseClient.from('order_items').insert(orderItemsPayload);
        if (itemsErr) throw itemsErr;

        // 3. เปลี่ยนสถานะโต๊ะเป็น occupied
        await supabaseClient.from('tables').update({ status: 'occupied' }).eq('id', currentTableId);

        alert('สั่งอาหารสำเร็จ! ออเดอร์ส่งตรงเข้าครัวแล้วครับ 👨‍🍳');
        cart = [];
        updateCartUI();
        closePaymentModal();

      } catch (err) {
        alert('เกิดข้อผิดพลาดในการสั่งอาหาร: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-paper-plane mr-2"></i> โอนแล้ว ส่งเข้าครัวเลย!';
      }
    }
  </script>
</body>
</html>
